<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="./assets/logo-icon.svg" />
  <title>Product Details - ShopFront</title>

    <link rel="stylesheet" href="./css/style.css" />
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icon pack  -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
</head>

<body>
  <body>
  <!--  TOP NAVBAR -->
  <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
    <div class="container py-1">
      <!-- Brand / logo -->
        <a class="navbar-brand fw-bold text-primary d-flex align-items-center gap-2" href="./index.html">
            <img src="./assets/logo.svg" alt="ShopFront Logo" width="36" height="36" class="object-fit-contain">
        </a>

      <!-- Mobile toggler-->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#topNav"
            aria-controls="topNav" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- navigation -->
        <div class="collapse navbar-collapse" id="topNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" href="./index.html">Products</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="./assets/docs.pdf">Document</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#About">About</a>
                </li>
            </ul>
        </div>

      <!-- Cart button opens offcanvas cart -->
      <button
        class="btn btn-primary position-relative"
        type="button"
        data-bs-toggle="offcanvas"
        data-bs-target="#cartCanvas"
        aria-controls="cartCanvas"
        aria-label="Open Cart"
      >
        <i class="bi bi-cart me-2"></i>
        <!-- Cart item count -->
        <span id="cartCount" class="position-absolute badge rounded-pill bg-danger">0</span>
      </button>
    </div>
  </nav>

  <!-- PRODUCT DETAILS SECTION -->
  <main class="product-body py-4 min-vh-100">
    <div class="container">

      <!-- Top action buttons -->
      <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
        <!-- Back button -->
        <a href="./index.html" class="btn btn-outline-secondary">
          <i class="bi bi-arrow-left me-2"></i>Back to Products
        </a>

        <!-- Open cart button -->
        <button
          class="btn btn-outline-primary"
          type="button"
          data-bs-toggle="offcanvas"
          data-bs-target="#cartCanvas"
          aria-controls="cartCanvas"
        >
          <i class="bi bi-cart3 me-2"></i>View Cart
        </button>
      </div>

      <!-- Loader shown while product is being fetched -->
      <div id="detailsLoader" class="text-center my-5">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-3 text-secondary">Loading product details...</p>
      </div>

      <!-- Error message area -->
      <div id="detailsError" class="d-none"></div>

      <!-- Main product details wrapper (hidden until data loads) -->
      <div id="detailsWrap" class="d-none">
        <div class="row g-4 align-items-stretch">

          <!-- Product image column -->
          <div class="col-12 col-lg-6">
            <div class="card border-0 shadow-sm h-100 product-detail-card">
              <div class="card-body p-3 p-md-4">
                <div class="detail-image-wrap">
                  <img id="detailImg" class="img-fluid detail-main-image" alt="Product image" />
                </div>
              </div>
            </div>
          </div>

          <!-- Product info column -->
          <div class="col-12 col-lg-6">
            <div class="card border-0 shadow-sm h-100 product-detail-card">
              <div class="card-body p-4 p-lg-5 d-flex flex-column">

                <!-- Product title, category, description -->
                <div class="mb-3">
                  <span id="detailCategory" class="badge text-bg-light border px-3 py-2 mb-3"></span>
                  <h1 id="detailTitle" class="display-6 fw-bold mb-2"></h1>
                  <p id="detailDesc" class="text-secondary mb-0"></p>
                </div>

                <!-- Price and stock summary -->
                <div class="row g-3 my-2">
                  <div class="col-6">
                    <div class="detail-info-box">
                      <div class="small text-secondary">Price</div>
                      <div id="detailPrice" class="h4 fw-bold mb-0"></div>
                    </div>
                  </div>

                  <div class="col-6">
                    <div class="detail-info-box">
                      <div class="small text-secondary">Availability</div>
                      <div id="detailStockText" class="fw-semibold"></div>
                    </div>
                  </div>
                </div>

                <!-- SKU and supplier info -->
                <div class="row g-3 mb-4">
                  <div class="col-6">
                    <div class="detail-info-box">
                      <div class="small text-secondary">SKU</div>
                      <div id="detailSku" class="fw-semibold"></div>
                    </div>
                  </div>

                  <div class="col-6">
                    <div class="detail-info-box">
                      <div class="small text-secondary">Supplier</div>
                      <div id="detailSupplier" class="fw-semibold"></div>
                    </div>
                  </div>
                </div>

                <!-- Bottom area pushed to bottom of card -->
                <div class="mt-auto">
                  <!-- Quantity label -->
                  <label class="form-label fw-semibold">Quantity</label>

                  <!-- Quantity controls + stock badge -->
                  <div class="d-flex flex-wrap gap-3 align-items-center mb-4">
                    <div class="quantity-box">
                      <button id="qtyDecrease" class="btn btn-outline-secondary" type="button">-</button>
                      <input id="detailQty" type="number" class="form-control text-center" value="1" min="1" />
                      <button id="qtyIncrease" class="btn btn-outline-secondary" type="button">+</button>
                    </div>

                    <span id="detailStockBadge" class="badge rounded-pill px-3 py-2"></span>
                  </div>

                  <!-- Action buttons -->
                  <div class="d-grid gap-2 d-sm-flex">
                    <button id="detailAddToCart" class="btn btn-primary btn-lg flex-grow-1">
                      <i class="bi bi-bag-plus me-2"></i>Add to Cart
                    </button>

                    <a href="./checkout.html" class="btn btn-success btn-lg">
                      <i class="bi bi-credit-card me-2"></i>Checkout
                    </a>
                  </div>

                  <!-- Inline success / warning / error messages -->
                  <div id="detailMessage" class="mt-3"></div>
                </div>
              </div>
            </div>
          </div>
        </div>

        
      </div>
    </div>
  </main>

  <!-- CART OFFCANVAS -->
  <div class="offcanvas offcanvas-end" tabindex="-1" id="cartCanvas" aria-labelledby="cartCanvasLabel">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title" id="cartCanvasLabel">
        <i class="bi bi-cart3 me-2"></i>Your Cart
      </h5>
      <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>

    <div class="offcanvas-body d-flex flex-column gap-3">
      <!-- Cart items render here -->
      <div id="cartItems" class="d-flex flex-column gap-2 row g-3 pt-2"></div>

      <!-- Cart summary -->
      <div class="mt-auto sticky-summary">
        <div class="card border-0 shadow-sm">
          <div class="card-body">
            <div class="d-flex justify-content-between">
              <span class="text-secondary">Total</span>
              <span id="cartTotal" class="fw-bold cart-total">0</span>
            </div>

            <div class="d-grid gap-2 mt-3">
              <button class="btn btn-success" id="checkoutBtn" type="button">Checkout</button>
              <button class="btn btn-outline-danger" id="clearCartBtn" type="button">Clear Cart</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- CART ITEM TEMPLATE -->
  <template id="cartItemTemplate">
    <div class="col-12 item-delgetaion-id" data-cart-id="">
      <div class="card border-0 shadow-sm">
        <div class="card-body d-flex align-items-center gap-3">
          <img src="" width="64" height="48" class="rounded object-fit-cover" alt="">

          <div class="flex-grow-1">
            <div class="fw-semibold item-name">pname</div>
            <div class="text-secondary small item-meta">pCategory · pPrice</div>
          </div>

          <div class="d-flex align-items-center gap-2">
            <button class="btn btn-sm btn-outline-secondary" data-action="decrease">-</button>
            <div class="fw-semibold item-qty">1</div>
            <button class="btn btn-sm btn-outline-secondary" data-action="increase">+</button>
          </div>

          <button class="btn btn-sm btn-outline-danger" data-action="remove">
            <i class="bi bi-trash"></i>
          </button>
        </div>
      </div>
    </div>
  </template>

  <!-- TOAST MESSAGE -->
  <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 1100">
    <div
      id="cartToast"
      class="toast align-items-center text-bg-success border-0"
      role="alert"
      aria-live="assertive"
      aria-atomic="true"
      data-bs-delay="2500"
    >
      <div class="d-flex">
        <div class="toast-body d-flex align-items-center gap-2">
          <i class="bi bi-bag-check-fill fs-5"></i>
          <span id="cartToastMsg">Product added to cart!</span>
        </div>
        <button
          type="button"
          class="btn-close btn-close-white me-2 m-auto"
          data-bs-dismiss="toast"
          aria-label="Close"
        ></button>
      </div>
    </div>
  </div>

  <!-- Shared JS files -->
  <script src="./js/api.js"></script>
  <script src="./js/script.js"></script>
  <script src="./js/cart.js"></script>
  <script src="./js/product-details.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
