<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="./assets/logo-icon.svg" />
  <title>Checkout - JetStore</title>

  <link rel="stylesheet" href="./css/style.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
</head>
<body>
  <!-- Top navbar -->
  <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
    <div class="container py-1">
      <a class="navbar-brand fw-bold text-primary d-flex align-items-center gap-2" href="./index.html">
          <img src="./assets/logo.svg" alt="ShopFront Logo" width="36" height="36" class="object-fit-contain">
      </a>

      <!-- Mobile toggler-->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#topNav"
          aria-controls="topNav" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
      </button>

      <!-- navigation -->
      <div class="collapse navbar-collapse" id="topNav">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                  <a class="nav-link active" href="./index.html">Products</a>
              </li>
              <li class="nav-item">
                  <a class="nav-link" href="assets/docs.pdf">Document</a>
              </li>
              <li class="nav-item">
                  <a class="nav-link" href="#About">About</a>
              </li>
          </ul>
      </div>
    </div>
  </nav>

  <!-- Checkout section -->
  <section class="py-4">
    <div class="container">
      <div class="row g-4">
        <!-- Checkout form -->
        <div class="col-12 col-lg-7">
          <div class="card border-0 shadow-sm">
            <div class="card-body">
              <h2 class="h4 fw-bold mb-3">Checkout</h2>
              <p class="text-secondary">Enter your details to place your order.</p>

              <div id="checkoutMessage"></div>

              <form id="checkoutForm" class="mt-3">
                <div class="mb-3">
                  <label for="full_name" class="form-label">Full Name</label>
                  <input type="text" class="form-control" id="full_name" required />
                </div>

                <div class="mb-3">
                  <label for="email" class="form-label">Email</label>
                  <input type="email" class="form-control" id="email" required />
                </div>

                <div class="mb-3">
                  <label for="phone" class="form-label">Phone</label>
                  <input type="text" class="form-control" id="phone" />
                </div>

                <div class="mb-3">
                  <label for="address" class="form-label">Address</label>
                  <textarea class="form-control" id="address" rows="3"></textarea>
                </div>

                <button type="submit" id="placeOrderBtn" class="btn btn-success">
                  Place Order
                </button>
                <a href="./index.html" class="btn btn-outline-secondary ms-2">
                  Continue Shopping
                </a>
              </form>
            </div>
          </div>
        </div>

        <!-- Order summary -->
        <div class="col-12 col-lg-5">
          <div class="card border-0 shadow-sm">
            <div class="card-body">
              <h3 class="h5 fw-bold mb-3">Order Summary</h3>

              <div id="checkoutItems" class="d-flex flex-column gap-3"></div>

              <hr />

              <div class="d-flex justify-content-between">
                <span class="text-secondary">Total</span>
                <strong>$<span id="checkoutTotal">0.00</span></strong>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="./js/api.js"></script>
  <script src="./js/script.js"></script>
  
  <script src="./js/cart.js"></script>
  <script src="./js/checkout.js"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
